<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEPSE Breadth · 2026-04-16</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6f8;
  --bg2:#ffffff;
  --bg3:#f0f1f4;
  --bg4:#e8eaee;
  --border:#e2e4e9;
  --border2:#d0d4dc;
  --text:#1a1d23;
  --muted:#6b7280;
  --dim:#9ca3af;
  --green:#0a7c3e;--green-dim:#bbf7d0;--green-bg:#f0fdf4;
  --red:#c8102e;--red-dim:#fecdd3;--red-bg:#fff1f2;
  --amber:#92400e;--amber-bg:#fffbeb;--amber-dim:#fde68a;
  --blue:#1d4ed8;--blue-bg:#eff6ff;--blue-dim:#bfdbfe;
  --teal:#0f766e;--teal-bg:#f0fdfa;--teal-dim:#99f6e4;
  --mono:'DM Mono',monospace;
  --sans:'DM Sans',sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow2:0 4px 12px rgba(0,0,0,.1);
}
html{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px}
body{min-height:100vh}
.shell{max-width:1600px;margin:0 auto;padding:32px 28px 100px}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid var(--border)}
.logo{font-family:var(--mono);font-size:16px;font-weight:500;letter-spacing:.04em;color:var(--teal)}
.logo span{color:var(--dim);font-weight:400}
.topbar-meta{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.06em;text-align:right;line-height:2}

/* ── CARD STRIPS ── */
.strip-label{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;margin-top:28px}
.cards{display:flex;flex-wrap:wrap;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:6px;box-shadow:var(--shadow)}
.card{background:var(--bg2);padding:16px 20px;flex:1;min-width:110px}
.card.clickable{cursor:pointer;transition:background .12s}
.card.clickable:hover{background:var(--bg3)}
.card.active-card{background:var(--teal-bg);outline:2px solid var(--teal-dim)}
.card.active-card .clabel{color:var(--teal)}
.clabel{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.cval{font-family:var(--mono);font-size:24px;font-weight:500;line-height:1}
.csub{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:5px}
.g{color:var(--green)}.r{color:var(--red)}.a{color:var(--amber)}.b{color:var(--blue)}.t{color:var(--teal)}.m{color:var(--muted)}

/* theme cards — smaller since many */
.theme-cards{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.theme-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px 16px;cursor:pointer;transition:all .12s;box-shadow:var(--shadow)}
.theme-card:hover{background:var(--bg3);border-color:var(--border2)}
.theme-card.active-card{background:var(--teal-bg);border-color:var(--teal-dim)}
.theme-card.active-card .tc-label{color:var(--teal)}
.tc-label{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.tc-val{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--text)}
.tc-name{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* panel (stage / theme / 10D movers) */
.panel{display:none;border:1px solid var(--teal-dim);border-radius:6px;background:var(--bg2);margin-bottom:24px;overflow:hidden;box-shadow:var(--shadow2)}
.panel.open{display:block}
.ph{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);background:var(--teal-bg)}
.pt{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--teal);text-transform:uppercase;font-weight:500}
.px{font-family:var(--mono);font-size:10px;padding:4px 12px;border:1px solid var(--teal-dim);border-radius:4px;background:transparent;color:var(--teal);cursor:pointer;transition:all .12s}
.px:hover{background:var(--teal-dim);color:var(--teal)}

/* section label */
.slabel{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;margin-top:32px}

/* main table */
.tbox{border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:32px;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:13px}
thead tr{background:var(--bg3)}
th{padding:11px 13px;text-align:right;font-size:10px;font-weight:500;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;user-select:none}
th.tl{text-align:left}
th.sortable{cursor:pointer;transition:color .12s}
th.sortable:hover{color:var(--text)}
th.sort-asc,th.sort-desc{color:var(--teal)}
th .arr{margin-left:4px;font-size:9px}
td{padding:10px 13px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;vertical-align:middle;font-size:13px}
td.tl{text-align:left}
tbody tr:last-child td{border-bottom:none}
tbody tr{background:var(--bg2)}
tbody tr:hover{background:var(--bg3)}
tbody tr.exp{background:var(--bg3)}

/* ratio pill */
.rp{display:inline-block;font-family:var(--mono);font-size:11px;padding:3px 8px;border-radius:4px;font-weight:500;min-width:46px;text-align:center}
.rb{background:var(--green-bg);color:var(--green);border:1px solid var(--green-dim)}
.rr{background:var(--red-bg);color:var(--red);border:1px solid var(--red-dim)}
.rn{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}

/* click targets in sector table */
.ca{cursor:pointer;color:var(--green);font-weight:500;transition:opacity .1s}.ca:hover{opacity:.65}
.cd{cursor:pointer;color:var(--red);font-weight:500;transition:opacity .1s}.cd:hover{opacity:.65}
.sname{color:var(--text);font-weight:600;font-size:13px}

/* drill panel in sector table */
.drill{display:none}.drill.open{display:table-row}
.drill>td{padding:0!important;background:var(--teal-bg)!important}
.di{padding:16px 20px 20px;border-top:2px solid var(--teal-dim)}
.dh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.dt{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--teal);text-transform:uppercase;font-weight:500}
.dx{font-family:var(--mono);font-size:10px;padding:4px 10px;border:1px solid var(--teal-dim);border-radius:4px;background:transparent;color:var(--teal);cursor:pointer}
.dx:hover{background:var(--teal-dim)}

/* sub tables */
.stbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:13px}
.stbl th{padding:9px 12px;font-size:10px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;text-align:right;border-bottom:1px solid var(--border);background:var(--bg3);user-select:none;white-space:nowrap}
.stbl th.tl{text-align:left}
.stbl th.sortable{cursor:pointer;transition:color .12s}
.stbl th.sortable:hover{color:var(--text)}
.stbl th.sort-asc,.stbl th.sort-desc{color:var(--teal)}
.stbl td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--border);font-size:13px}
.stbl td.tl{text-align:left}
.stbl tr:last-child td{border-bottom:none}
.stbl tr:hover td{background:var(--bg3)}

/* stage badge */
.stage{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:4px;font-size:12px;font-weight:600;font-family:var(--mono)}
.s1{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-dim)}
.s2{background:var(--green-bg);color:var(--green);border:1px solid var(--green-dim)}
.s3{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-dim)}
.s4{background:var(--red-bg);color:var(--red);border:1px solid var(--red-dim)}

/* bar */
.bw{display:inline-flex;align-items:center;gap:8px}
.bg_{flex:0 0 56px;height:3px;background:var(--bg4);border-radius:2px}
.bf{height:3px;border-radius:2px}

/* badges */
.bdg{display:inline-block;font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:4px;min-width:28px;text-align:center;font-weight:500}
.bg-up{background:var(--green-bg);color:var(--green);border:1px solid var(--green-dim)}
.bg-dn{background:var(--red-bg);color:var(--red);border:1px solid var(--red-dim)}

/* theme tag */
.tag{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:4px;background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-dim);font-weight:500}

/* toolbar */
.tb{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.sb{font-family:var(--mono);font-size:13px;background:var(--bg2);border:1.5px solid var(--border);color:var(--text);padding:7px 12px;border-radius:6px;outline:none;width:220px;box-shadow:var(--shadow)}
.sb:focus{border-color:var(--teal)}
.fb{font-family:var(--mono);font-size:10px;padding:6px 14px;border:1.5px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--muted);cursor:pointer;letter-spacing:.06em;transition:all .12s;box-shadow:var(--shadow)}
.fb:hover,.fb.on{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.fb.on-g{background:var(--green-bg);color:var(--green);border-color:var(--green-dim)}
.fb.on-r{background:var(--red-bg);color:var(--red);border-color:var(--red-dim)}

.foot{font-family:var(--mono);font-size:10px;color:var(--dim);text-align:center;padding-top:32px;letter-spacing:.08em}
.empty{text-align:center;padding:32px;color:var(--dim);font-size:13px}
</style>
</head>

const rc=v=>v===null?'rn':v>=1?'rb':'rr';
const rs=v=>v===null?'∞':v.toFixed(2);
function sg(v){
  if(v==null)return'<span style="color:var(--dim)">—</span>';
  const c=v>0?'g':v<0?'r':'m';
  return`<span class="${c}">${v>0?'+':''}${v.toFixed(2)}%</span>`;
}
function stg(s){
  if(!s||s==='nan'||s==='')return'<span style="color:var(--dim)">—</span>';
  const lb={1:'Accumulation',2:'Mark Up',3:'Distribution',4:'Decline'};
  return`<span class="stage s${s}" title="${lb[s]||''}">${s}</span>`;
}
function bdg(n,t){
  if(!n||n===0)return'<span style="color:var(--dim)">—</span>';
  return`<span class="bdg bg-${t}">${n}</span>`;
}
function shr(s){
  if(!s||s===''||s==='nan')return'<span style="color:var(--dim)">—</span>';
  const n=parseFloat(String(s).replace(/,/g,''));
  if(isNaN(n))return s;
  return n>=1e7?(n/1e7).toFixed(2)+'Cr':n>=1e5?(n/1e5).toFixed(2)+'L':n.toLocaleString();
}
function bar(v,col){
  if(v==null)return'<span style="color:var(--dim)">—</span>';
  const w=Math.min(Math.abs(v)/30*100,100);
  const isPos=v>0;
  return`<div class="bw"><span style="color:var(--${col});min-width:58px;font-size:12px">${isPos?'+':''}${v.toFixed(1)}%</span><div class="bg_"><div class="bf" style="width:${w}%;background:var(--${col})"></div></div></div>`;
}
function barHigh(v){return bar(v,'red')}
function barLow(v) {return bar(v,'green')}
function barChg(v) {if(v==null)return'<span style="color:var(--dim)">—</span>';
  return bar(v,v>=0?'green':'red');}

function doSort(rows,cols,state){
  if(!state.col) return rows;
  const c=cols.find(x=>x.key===state.col);
  if(!c) return rows;
  return [...rows].sort((a,b)=>{
    const va=c.get(a),vb=c.get(b);
    if(typeof va==='string') return state.dir*va.localeCompare(vb);
    return state.dir*(va-vb);
  });
}

function buildHead(el,cols,state,onSort){
  el.innerHTML=cols.map((c,i)=>`
    <th class="${c.align?c.align+' ':''} sortable${state.col===c.key?(state.dir===1?' sort-asc':' sort-desc'):''}">
      ${c.label}<span class="arr">${state.col===c.key?(state.dir===1?'▲':'▼'):'⇅'}</span>
    </th>`).join('');
  el.querySelectorAll('th').forEach((th,i)=>th.addEventListener('click',()=>onSort(i)));
}

function stockRow(s,cols){
  return`<tr>${cols.map(c=>{
    switch(c.key){
      case'symbol':      return`<td class="tl" style="font-weight:600">${s.symbol}</td>`;
      case'name':        return`<td class="tl" style="color:var(--muted);max-width:190px;overflow:hidden;text-overflow:ellipsis" title="${s.name}">${s.name.length>28?s.name.slice(0,26)+'…':s.name}</td>`;
      case'sector':      return`<td class="tl" style="color:var(--muted);font-size:12px">${s.sector||'—'}</td>`;
      case'theme':       return`<td>${s.theme&&s.theme!=='nan'&&s.theme!==''?`<span class="tag">${s.theme}</span>`:'<span style="color:var(--dim)">—</span>'}</td>`;
      case'close':       return`<td style="font-weight:500">${s.close!=null?s.close.toLocaleString():'—'}</td>`;
      case'pct':         return`<td>${sg(s.pct)}</td>`;
      case'pct10d':      return`<td>${sg(s.pct10d)}</td>`;
      case'pct10d_map':  return`<td>${barChg(s.pct10d_map)}</td>`;
      case'pct5d':       return`<td>${barChg(s.pct5d)}</td>`;
      case'pct_from_high':return`<td>${barHigh(s.pct_from_high)}</td>`;
      case'pct_from_low': return`<td>${barLow(s.pct_from_low)}</td>`;
      case'stage':       return`<td>${stg(s.stage)}</td>`;
      case'listed_num':  return`<td style="color:var(--muted)">${shr(s.listed_shares)}</td>`;
      default:           return`<td>—</td>`;
    }
  }).join('')}</tr>`;
}

function renderTable(theadId,tbodyId,cols,state,rows,onSort){
  buildHead(document.getElementById(theadId),cols,state,onSort);
  const sorted=doSort(rows,cols,state);
  document.getElementById(tbodyId).innerHTML=
    sorted.length?sorted.map(s=>stockRow(s,cols)).join('')
    :`<tr><td colspan="${cols.length}" class="empty">No data</td></tr>`;
}

  const row=document.getElementById(`dr${i}`);

  document.querySelectorAll('.drill').forEach(r=>r.classList.remove('open'));
  document.querySelectorAll('tbody tr:not(.drill)').forEach(r=>r.classList.remove('exp'));
  if(same){openI=null;openT=null;return;}

  row.classList.add('open');

function fillDrill(i,t){
  const sec=S[i].sector;
  const lbs={adv:'Advanced',dec:'Declined',adv3:'Adv >3%',dec3:'Dec >3%',
             up10d:`↑10%+ (10D)`,dn10d:`↓10%+ (10D)`};

  // 10D mover types — filter global mover arrays by sector, use COL_10D
  if(t==='up10d'||t==='dn10d'){
    const pool = t==='up10d' ? UP10 : DN10;
    const rows = pool.filter(s=>s.sector===sec);
    const key=`${i}_${t}`;
    if(!drillSts[key]) drillSts[key]={col:'pct10d',dir:t==='up10d'?-1:1};
    const st=drillSts[key];
    const di=document.getElementById(`di${i}`);
    di.innerHTML=`
      <div class="dh">
        <span class="dt">${sec} — ${lbs[t]} (${rows.length})</span>
        <button class="dx" onclick="tog(${i},'${t}')">✕ close</button>
      </div>
      <table class="stbl"><thead><tr id="dth${i}_${t}"></tr></thead><tbody id="dtb${i}_${t}"></tbody></table>`;
    const rerender=()=>renderTable(`dth${i}_${t}`,`dtb${i}_${t}`,COL_10D,st,rows,(ci)=>{
      const c=COL_10D[ci];
      st.col===c.key?st.dir*=-1:(st.col=c.key,st.dir=c.defaultDir);
      rerender();
    });
    rerender();
    return;
  }

  // Standard adv/dec types
  const fns={adv:s=>s.pct>0,dec:s=>s.pct<0,adv3:s=>s.pct>3,dec3:s=>s.pct<-3};
  const key=`${i}_${t}`;
  if(!drillSts[key]) drillSts[key]={col:'pct',dir:t.startsWith('adv')?-1:1};
  const st=drillSts[key];
  const rows=K.filter(s=>s.sector===sec&&fns[t](s));
  const di=document.getElementById(`di${i}`);
  di.innerHTML=`
    <div class="dh">
      <span class="dt">${sec} — ${lbs[t]} (${rows.length})</span>
      <button class="dx" onclick="tog(${i},'${t}')">✕ close</button>
    </div>
    <table class="stbl"><thead><tr id="dth${i}_${t}"></tr></thead><tbody id="dtb${i}_${t}"></tbody></table>`;
  const rerender=()=>renderTable(`dth${i}_${t}`,`dtb${i}_${t}`,COL_STD,st,rows,(ci)=>{
    const c=COL_STD[ci];
    st.col===c.key?st.dir*=-1:(st.col=c.key,st.dir=c.defaultDir);
    rerender();
  });
  rerender();
}

  const rerender=()=>renderTable('all-thead','alltbody',COL_STD,allSt,rows,(i)=>{

    allSt.col===c.key?allSt.dir*=-1:(allSt.col=c.key,allSt.dir=c.defaultDir);
    rerender();
  });
  rerender();
}

sf('all');
